name: OpenCodeReview

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  issue_comment:
    types:
      - created

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: >-
    ${{
      (
        github.event_name == 'pull_request_target'
        || (
          github.event_name == 'issue_comment'
          && github.event.issue.pull_request
          && github.event.comment.user.type != 'Bot'
          && (
            github.event.comment.author_association == 'OWNER'
            || github.event.comment.author_association == 'MEMBER'
            || github.event.comment.author_association == 'COLLABORATOR'
          )
          && (
            startsWith(github.event.comment.body, '/open-code-review')
            || startsWith(github.event.comment.body, '@open-code-review')
          )
        )
      )
      && format('open-code-review-{0}', github.event.pull_request.number || github.event.issue.number)
      || format('open-code-review-noop-{0}', github.run_id)
    }}
  cancel-in-progress: true

jobs:
  review:
    if: >-
      (github.event_name == 'pull_request_target' && github.event.pull_request.draft == false)
      || (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && github.event.comment.user.type != 'Bot'
        && (
          github.event.comment.author_association == 'OWNER'
          || github.event.comment.author_association == 'MEMBER'
          || github.event.comment.author_association == 'COLLABORATOR'
        )
        && (
          startsWith(github.event.comment.body, '/open-code-review')
          || startsWith(github.event.comment.body, '@open-code-review')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Resolve pull request context
        id: pr-context
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail
          PR_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}")"
          echo "base_ref=$(jq -r '.base.ref' <<<"${PR_JSON}")" >> "${GITHUB_OUTPUT}"
          echo "head_sha=$(jq -r '.head.sha' <<<"${PR_JSON}")" >> "${GITHUB_OUTPUT}"
          echo "title=$(jq -r '.title' <<<"${PR_JSON}")" >> "${GITHUB_OUTPUT}"

      - name: Review with GPT-4.1
        id: gpt-review
        continue-on-error: true
        uses: alibaba/open-code-review@4ee453fd795955fe9467d28860b02ca550730c0a
        with:
          llm_url: https://models.github.ai/inference/chat/completions
          llm_auth_token: ${{ github.token }}
          llm_model: openai/gpt-4.1
          llm_use_anthropic: 'false'
          llm_extra_headers: Accept=application/vnd.github+json,X-GitHub-Api-Version=2026-03-10
          llm_extra_body: '{"temperature":0.05}'
          llm_timeout: '300'
          language: Italian
          github_token: ${{ github.token }}
          ocr_version: 1.7.11
          review_concurrency: '1'
          background: ${{ steps.pr-context.outputs.title || github.event.pull_request.title }}
          rule: .opencodereview/rule.json
          sticky_summary: 'true'
          incremental: 'true'
          incremental_overlap_threshold: '0.75'
          upload_artifacts: 'true'
          base_ref: ${{ steps.pr-context.outputs.base_ref }}
          head_sha: ${{ steps.pr-context.outputs.head_sha }}

      - name: Deep review with DeepSeek V3
        if: >-
          github.event_name == 'issue_comment'
          && (
            startsWith(github.event.comment.body, '/open-code-review-deep')
            || startsWith(github.event.comment.body, '@open-code-review-deep')
          )
        continue-on-error: true
        uses: alibaba/open-code-review@4ee453fd795955fe9467d28860b02ca550730c0a
        with:
          llm_url: https://models.github.ai/inference/chat/completions
          llm_auth_token: ${{ github.token }}
          llm_model: deepseek/deepseek-v3-0324
          llm_use_anthropic: 'false'
          llm_extra_headers: Accept=application/vnd.github+json,X-GitHub-Api-Version=2026-03-10
          llm_extra_body: '{"temperature":0.05}'
          llm_timeout: '300'
          language: Italian
          github_token: ${{ github.token }}
          ocr_version: 1.7.11
          review_concurrency: '1'
          background: Revisione indipendente DeepSeek V3 per ${{ steps.pr-context.outputs.title }}
          rule: .opencodereview/rule.json
          sticky_summary: 'false'
          incremental: 'true'
          incremental_overlap_threshold: '0.75'
          upload_artifacts: 'false'
          base_ref: ${{ steps.pr-context.outputs.base_ref }}
          head_sha: ${{ steps.pr-context.outputs.head_sha }}
