name: Publish LEVYRA Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v2.3.8"

permissions:
  contents: write

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    env:
      YOUTUBE_INNERTUBE_API_KEY: ${{ secrets.YOUTUBE_INNERTUBE_API_KEY }}
      LEVYRA_KEYSTORE_PASSWORD: ${{ secrets.LEVYRA_KEYSTORE_PASSWORD }}
      LEVYRA_KEY_ALIAS: ${{ secrets.LEVYRA_KEY_ALIAS }}
      LEVYRA_KEY_PASSWORD: ${{ secrets.LEVYRA_KEY_PASSWORD }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        shell: bash
        run: |
          set -euo pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Resolve Release Version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          fi

          VERSION="${TAG_NAME#v}"
          VERSION="${VERSION#V}"

          if ! printf "%s" "${VERSION}" | grep -Eq '^[0-9]+(\.[0-9]+){0,3}([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid release version: ${VERSION}" >&2
            exit 1
          fi

          BASE_VERSION="${VERSION%%[-+]*}"
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "${BASE_VERSION}"

          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          BUILD="${BUILD:-0}"

          VERSION_CODE=$((10#$MAJOR * 1000000 + 10#$MINOR * 10000 + 10#$PATCH * 100 + 10#$BUILD))

          echo "TAG_NAME=${TAG_NAME}" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"
          echo "LEVYRA_VERSION_NAME=${VERSION}" >> "${GITHUB_ENV}"
          echo "LEVYRA_VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"

      - name: Prepare Release Signing
        shell: bash
        env:
          LEVYRA_KEYSTORE_BASE64: ${{ secrets.LEVYRA_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "${YOUTUBE_INNERTUBE_API_KEY}"
          test -n "${LEVYRA_KEYSTORE_BASE64}"
          test -n "${LEVYRA_KEYSTORE_PASSWORD}"
          test -n "${LEVYRA_KEY_ALIAS}"
          test -n "${LEVYRA_KEY_PASSWORD}"
          printf "%s" "${LEVYRA_KEYSTORE_BASE64}" | tr -d '\r\n' | base64 --decode > app/levyra-release.jks
          keytool -list -keystore app/levyra-release.jks -storepass "${LEVYRA_KEYSTORE_PASSWORD}" -alias "${LEVYRA_KEY_ALIAS}" >/dev/null

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --no-configuration-cache clean assembleRelease -PlevyraVersionName="${VERSION}" -PlevyraVersionCode="${VERSION_CODE}"

      - name: Verify APK Version
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          BADGING="$(${ANDROID_HOME}/build-tools/36.0.0/aapt dump badging "${APK}")"
          printf "%s\n" "${BADGING}"
          printf "%s\n" "${BADGING}" | grep -F "versionName='${VERSION}'"
          printf "%s\n" "${BADGING}" | grep -F "versionCode='${VERSION_CODE}'"
          "${ANDROID_HOME}/build-tools/36.0.0/apksigner" verify --print-certs "${APK}" > apk-signing-certs.txt

      - name: Prepare Release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/LEVYRA-${VERSION}.apk"
          cp apk-signing-certs.txt artifacts/apk-signing-certs.txt

          {
            echo "LEVYRA ${VERSION}"
            echo
            echo "Nuova build disponibile per il download diretto dall'app."
            echo
            echo "Aggiorna dall'app aprendo Impostazioni > Aggiornamenti > Check."
          } > release-notes.md

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: levyra-release-${{ env.VERSION }}
          path: artifacts/LEVYRA-${{ env.VERSION }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "artifacts/LEVYRA-${VERSION}.apk" --clobber
            gh release edit "${TAG_NAME}" --latest --title "LEVYRA ${VERSION}" --notes-file release-notes.md
          else
            gh release create "${TAG_NAME}" "artifacts/LEVYRA-${VERSION}.apk" --latest --title "LEVYRA ${VERSION}" --notes-file release-notes.md
          fi
