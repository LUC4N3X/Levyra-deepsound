name: Workflow Duplicates Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workflow-duplicates-guard:
    name: Detect duplicated workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Scan workflows
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          workflows_dir = Path(".github/workflows")
          allowed_build_workflows = {
              "pr-check.yml",
              "nightly-extractor-check.yml",
              "apk-artifact-check.yml",
              "quick-apk.yml"
          }

          # This guard's own source mentions markers like "assembleRelease" and
          # "gh release" to detect them in other files, so it must not scan
          # itself or it would flag itself as a builder/publisher.
          self_workflow = "workflow-duplicates-guard.yml"
