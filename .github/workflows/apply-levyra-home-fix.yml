# Temporary self-cleaning workflow
name: Apply Levyra Home Fix

on:
  push:
    branches:
      - claude/simpmusic-graphic-improvements-le6347
    paths:
      - .github/workflows/apply-levyra-home-fix.yml
      - '.github/levyra-home-cold-start-fix.part-*'

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Apply source changes
        shell: bash
        run: |
          set -euo pipefail
          cat .github/levyra-home-cold-start-fix.part-* > /tmp/levyra-home-fix.patch
          git apply --check /tmp/levyra-home-fix.patch
          git apply /tmp/levyra-home-fix.patch
          rm .github/levyra-home-cold-start-fix.part-*
          rm .github/workflows/apply-levyra-home-fix.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(home): deduplicate albums and smooth cold startup"
          git push origin "HEAD:${{ github.ref_name }}"
