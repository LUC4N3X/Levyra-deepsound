name: Apply motion ViewModel fix

on:
  push:
    branches:
      - agent/motion-artwork-engine

permissions:
  contents: write

concurrency:
  group: apply-motion-viewmodel-fix
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      YOUTUBE_INNERTUBE_API_KEY: levyra_ci_dummy_key
      LEVYRA_KEYSTORE_FILE: app/levyra-ci-release.jks
      LEVYRA_KEYSTORE_PASSWORD: levyra_ci_password
      LEVYRA_KEY_ALIAS: levyra_ci
      LEVYRA_KEY_PASSWORD: levyra_ci_password
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/motion-artwork-engine
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare CI release signing
        shell: bash
        run: |
          set -euo pipefail
          rm -f "${LEVYRA_KEYSTORE_FILE}"
          keytool -genkeypair \
            -keystore "${LEVYRA_KEYSTORE_FILE}" \
            -storepass "${LEVYRA_KEYSTORE_PASSWORD}" \
            -alias "${LEVYRA_KEY_ALIAS}" \
            -keypass "${LEVYRA_KEY_PASSWORD}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=LEVYRA CI,O=LUC4N3X,C=IT" \
            >/dev/null

      - name: Apply guarded request generation
        shell: python
        run: |
          from pathlib import Path

          path = Path("app/src/main/java/com/luc4n3x/levyra/viewmodel/LevyraViewModel.kt")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match, found {count}: {old[:80]!r}")
              text = text.replace(old, new, 1)

          replace_once(
              """    private var motionArtworkJob: Job? = null
              @Volatile private var motionArtworkRequestKey: String? = null
              private var motionArtworkPrefetchJob: Job? = null
          """,
              """    private var motionArtworkJob: Job? = null
              @Volatile private var motionArtworkRequestKey: String? = null
              private val motionArtworkRequestGeneration = AtomicLong(0L)
              private var motionArtworkPrefetchJob: Job? = null
          """
          )

          replace_once(
              """        } else {
                      motionArtworkJob?.cancel()
                      motionArtworkRequestKey = null
                      motionArtworkPrefetchJob?.cancel()
                  }
          """,
              """        } else {
                      motionArtworkRequestGeneration.incrementAndGet()
                      motionArtworkJob?.cancel()
                      motionArtworkRequestKey = null
                      motionArtworkPrefetchJob?.cancel()
                  }
          """
          )

          replace_once(
              """        youtubeEngagementJob?.cancel()
                  motionArtworkJob?.cancel()
                  motionArtworkRequestKey = null
          """,
              """        youtubeEngagementJob?.cancel()
                  motionArtworkRequestGeneration.incrementAndGet()
                  motionArtworkJob?.cancel()
                  motionArtworkRequestKey = null
          """
          )

          replace_once(
              """    private fun refreshMotionArtworkAround(current: Track) {
                  if (!_state.value.animationsEnabled) {
                      motionArtworkJob?.cancel()
                      motionArtworkRequestKey = null
                      _state.update { it.copy(motionArtwork = null, motionArtworkLoading = false) }
                      return
                  }
                  val expectedKey = MotionArtworkIdentityKey.create(current)
                  if (motionArtworkJob?.isActive == true && motionArtworkRequestKey == expectedKey) return
                  motionArtworkJob?.cancel()
                  motionArtworkRequestKey = expectedKey
                  motionArtworkJob = viewModelScope.launch(Dispatchers.IO) {
                      try {
                          val resolved = runCatching { motionArtworkEngine.resolve(current) }
                              .onFailure { error ->
                                  if (error is CancellationException) throw error
                                  Timber.d(error, "Motion artwork resolve failed for %s", current.id)
                              }
                              .getOrNull()
                          if (!isActive) return@launch
                          val activeTrack = _state.value.currentTrack
                          if (activeTrack != null && MotionArtworkIdentityKey.create(activeTrack) == expectedKey) {
                              _state.update {
                                  it.copy(
                                      motionArtwork = resolved,
                                      motionArtworkLoading = false
                                  )
                              }
                          }
                          prefetchNextMotionArtwork(current)
                      } finally {
                          if (motionArtworkRequestKey == expectedKey) motionArtworkRequestKey = null
                      }
                  }
              }
          """,
              """    private fun refreshMotionArtworkAround(current: Track) {
                  if (!_state.value.animationsEnabled) {
                      motionArtworkRequestGeneration.incrementAndGet()
                      motionArtworkJob?.cancel()
                      motionArtworkRequestKey = null
                      _state.update { it.copy(motionArtwork = null, motionArtworkLoading = false) }
                      return
                  }
                  val expectedKey = MotionArtworkIdentityKey.create(current)
                  if (motionArtworkJob?.isActive == true && motionArtworkRequestKey == expectedKey) return
                  motionArtworkJob?.cancel()
                  val requestGeneration = motionArtworkRequestGeneration.incrementAndGet()
                  motionArtworkRequestKey = expectedKey
                  motionArtworkJob = viewModelScope.launch(Dispatchers.IO) {
                      try {
                          val resolved = runCatching { motionArtworkEngine.resolve(current) }
                              .onFailure { error ->
                                  if (error is CancellationException) throw error
                                  Timber.d(error, "Motion artwork resolve failed for %s", current.id)
                              }
                              .getOrNull()
                          if (!isActive) return@launch
                          var published = false
                          _state.update { latest ->
                              val activeTrack = latest.currentTrack
                              val stillOwnsRequest = motionArtworkRequestGeneration.get() == requestGeneration &&
                                  motionArtworkRequestKey == expectedKey &&
                                  latest.animationsEnabled &&
                                  activeTrack != null &&
                                  MotionArtworkIdentityKey.create(activeTrack) == expectedKey
                              published = stillOwnsRequest
                              if (stillOwnsRequest) {
                                  latest.copy(
                                      motionArtwork = resolved,
                                      motionArtworkLoading = false
                                  )
                              } else {
                                  latest
                              }
                          }
                          if (published && motionArtworkRequestGeneration.get() == requestGeneration) {
                              prefetchNextMotionArtwork(current)
                          }
                      } finally {
                          if (
                              motionArtworkRequestGeneration.get() == requestGeneration &&
                              motionArtworkRequestKey == expectedKey
                          ) {
                              motionArtworkRequestKey = null
                          }
                      }
                  }
              }
          """
          )

          replace_once(
              """        prefetchJob?.cancel()
                  motionArtworkJob?.cancel()
                  motionArtworkRequestKey = null
          """,
              """        prefetchJob?.cancel()
                  motionArtworkRequestGeneration.incrementAndGet()
                  motionArtworkJob?.cancel()
                  motionArtworkRequestKey = null
          """
          )

          path.write_text(text, encoding="utf-8")

      - name: Compile release Kotlin
        run: ./gradlew --no-daemon :app:compileReleaseKotlin

      - name: Commit guarded request generation
        run: |
          rm .github/workflows/apply-motion-viewmodel-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/luc4n3x/levyra/viewmodel/LevyraViewModel.kt .github/workflows/apply-motion-viewmodel-fix.yml
          git commit -m "Guard motion artwork request generation"
          git push origin HEAD:agent/motion-artwork-engine