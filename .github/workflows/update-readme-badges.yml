name: Update README badges

on:
  workflow_dispatch:
  watch:
    types:
      - started
  release:
    types:
      - published
      - edited
      - deleted
  schedule:
    - cron: "*/5 * * * *"
  push:
    branches:
      - main
    paths:
      - README.md
      - scripts/update-readme-badges.mjs
      - .github/workflows/update-readme-badges.yml

permissions:
  contents: write

concurrency:
  group: update-readme-badges
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - run: node scripts/update-readme-badges.mjs
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          if git diff --quiet -- README.md docs/assets/levyra-release.svg docs/assets/levyra-downloads.svg docs/assets/levyra-license.svg docs/assets/levyra-stars.svg; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/assets/levyra-release.svg docs/assets/levyra-downloads.svg docs/assets/levyra-license.svg docs/assets/levyra-stars.svg
          git commit -m "chore: update README badges"
          git push origin HEAD:main
