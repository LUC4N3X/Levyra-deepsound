name: Release Guard

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - gradle.properties
      - app/build.gradle.kts
      - README.md
      - .github/workflows/release-guard.yml
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to validate"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  guard:
    name: Validate Release Version Wiring
    runs-on: ubuntu-latest
    timeout-minutes: 10

