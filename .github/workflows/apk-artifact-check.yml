name: APK Artifact

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: apk-artifact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    name: APK Artifact
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      LEVYRA_KEYSTORE_FILE: app/levyra-release.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        shell: bash
        run: |
          set -euo pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-disabled: true

      - name: Validate Gradle Wrapper
        shell: bash
        run: |
          set -euo pipefail
          test -x ./gradlew
          test -f gradle/wrapper/gradle-wrapper.jar
          test -f gradle/wrapper/gradle-wrapper.properties
          ./gradlew --no-daemon --version

      - name: Prepare CI Signing
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          YOUTUBE_INNERTUBE_API_KEY_VALUE="levyra_ci_dummy_key"
          LEVYRA_KEYSTORE_PASSWORD_VALUE="levyra_ci_password"
          LEVYRA_KEY_ALIAS_VALUE="levyra_ci"
          LEVYRA_KEY_PASSWORD_VALUE="levyra_ci_password"
          rm -f "${LEVYRA_KEYSTORE_FILE}"
          keytool -genkeypair \
            -keystore "${LEVYRA_KEYSTORE_FILE}" \
            -storepass "${LEVYRA_KEYSTORE_PASSWORD_VALUE}" \
            -alias "${LEVYRA_KEY_ALIAS_VALUE}" \
            -keypass "${LEVYRA_KEY_PASSWORD_VALUE}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=LEVYRA CI,O=LUC4N3X,C=IT" \
            >/dev/null
          {
            echo "YOUTUBE_INNERTUBE_API_KEY=${YOUTUBE_INNERTUBE_API_KEY_VALUE}"
            echo "LEVYRA_KEYSTORE_PASSWORD=${LEVYRA_KEYSTORE_PASSWORD_VALUE}"
            echo "LEVYRA_KEY_ALIAS=${LEVYRA_KEY_ALIAS_VALUE}"
            echo "LEVYRA_KEY_PASSWORD=${LEVYRA_KEY_PASSWORD_VALUE}"
            echo "SIGNING_PROFILE=ci"
          } >> "${GITHUB_ENV}"

      - name: Prepare Release Signing
        if: ${{ github.event_name != 'pull_request' }}
        shell: bash
        env:
          YOUTUBE_INNERTUBE_API_KEY: ${{ secrets.YOUTUBE_INNERTUBE_API_KEY }}
          LEVYRA_KEYSTORE_BASE64: ${{ secrets.LEVYRA_KEYSTORE_BASE64 }}
          LEVYRA_KEYSTORE_PASSWORD: ${{ secrets.LEVYRA_KEYSTORE_PASSWORD }}
          LEVYRA_KEY_ALIAS: ${{ secrets.LEVYRA_KEY_ALIAS }}
          LEVYRA_KEY_PASSWORD: ${{ secrets.LEVYRA_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${YOUTUBE_INNERTUBE_API_KEY}"
          test -n "${LEVYRA_KEYSTORE_BASE64}"
          test -n "${LEVYRA_KEYSTORE_PASSWORD}"
          test -n "${LEVYRA_KEY_ALIAS}"
          test -n "${LEVYRA_KEY_PASSWORD}"
          rm -f "${LEVYRA_KEYSTORE_FILE}"
          printf "%s" "${LEVYRA_KEYSTORE_BASE64}" | tr -d '\r\n' | base64 --decode > "${LEVYRA_KEYSTORE_FILE}"
          keytool -list \
            -keystore "${LEVYRA_KEYSTORE_FILE}" \
            -storepass "${LEVYRA_KEYSTORE_PASSWORD}" \
            -alias "${LEVYRA_KEY_ALIAS}" \
            >/dev/null
          {
            echo "YOUTUBE_INNERTUBE_API_KEY=${YOUTUBE_INNERTUBE_API_KEY}"
            echo "LEVYRA_KEYSTORE_PASSWORD=${LEVYRA_KEYSTORE_PASSWORD}"
            echo "LEVYRA_KEY_ALIAS=${LEVYRA_KEY_ALIAS}"
            echo "LEVYRA_KEY_PASSWORD=${LEVYRA_KEY_PASSWORD}"
            echo "SIGNING_PROFILE=release"
          } >> "${GITHUB_ENV}"

      - name: Build Release APK
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --no-configuration-cache clean assembleRelease

      - name: Verify APK Artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          VERSION="$(grep -E '^levyraVersionName=' gradle.properties | head -n 1 | cut -d '=' -f 2- | tr -d '\r' | xargs)"
          VERSION_CODE="$(grep -E '^levyraVersionCode=' gradle.properties | head -n 1 | cut -d '=' -f 2- | tr -d '\r' | xargs)"
          APK="$(find app/build/outputs/apk/release -name '*.apk' -print -quit)"
          test -f "${APK}"
          SIZE_BYTES="$(stat -c%s "${APK}")"
          test "${SIZE_BYTES}" -gt 1048576
          BADGING="$("${ANDROID_HOME}/build-tools/36.0.0/aapt" dump badging "${APK}")"
          printf "%s\n" "${BADGING}" > artifacts/apk-badging.txt
          printf "%s\n" "${BADGING}" | grep -F "versionName='${VERSION}'"
          printf "%s\n" "${BADGING}" | grep -F "versionCode='${VERSION_CODE}'"
          "${ANDROID_HOME}/build-tools/36.0.0/apksigner" verify --print-certs "${APK}" > artifacts/apk-signing-certs.txt
          {
            echo "LEVYRA APK Artifact"
            echo "version=${VERSION}"
            echo "versionCode=${VERSION_CODE}"
            echo "signingProfile=${SIGNING_PROFILE}"
            echo "commit=${GITHUB_SHA}"
            echo "branch=${GITHUB_REF_NAME}"
            echo "sizeBytes=${SIZE_BYTES}"
            echo "builtAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } > artifacts/build-info.txt
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            echo "installableArtifact=false" >> artifacts/build-info.txt
            echo "This pull-request build uses an ephemeral CI signing key and is intentionally not published as an installable APK." > artifacts/README.txt
          else
            OUTPUT_APK="artifacts/LEVYRA-${VERSION}-release.apk"
            cp "${APK}" "${OUTPUT_APK}"
            sha256sum "${OUTPUT_APK}" > "${OUTPUT_APK}.sha256"
            echo "installableArtifact=true" >> artifacts/build-info.txt
          fi
          if [ -f app/build/outputs/mapping/release/mapping.txt ]; then
            cp app/build/outputs/mapping/release/mapping.txt artifacts/mapping.txt
          fi

      - name: Upload PR Verification Reports
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: levyra-pr-verification-${{ github.run_number }}
          path: artifacts
          if-no-files-found: error

      - name: Upload Updateable Release APK
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: levyra-release-apk-${{ github.run_number }}
          path: artifacts
          if-no-files-found: error
