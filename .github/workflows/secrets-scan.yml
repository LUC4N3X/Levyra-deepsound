name: Secrets Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Scan hardcoded secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan repository
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          root = Path(".").resolve()

          excluded_dirs = {
              ".git",
              ".github/workflows",
              ".gradle",
              ".idea",
              "build",
              "out",
              "dist",
              "node_modules",
              ".kotlin",
              ".cxx",
              "captures"
          }

          excluded_files = {
              "gradle-wrapper.jar",
              "gradlew",
              "gradlew.bat"
          }

          binary_extensions = {
              ".apk",
              ".aab",
              ".jar",
              ".keystore",
              ".jks",
              ".p12",
              ".png",
              ".jpg",
              ".jpeg",
              ".webp",
              ".gif",
              ".ico",
              ".zip",
              ".7z",
              ".rar",
              ".gz",
              ".mp3",
              ".mp4",
              ".m4a",
              ".webm",
              ".ttf",
              ".otf"
          }

          allowed_words = {
              "dummy",
              "example",
              "sample",
              "placeholder",
              "changeme",
              "change_me",
              "your_key_here",
              "your-api-key",
              "insert_key_here",
              "test",
              "debug",
              "ci-dummy-key",
              "not-a-secret"
          }

          patterns = [
              ("GitHub token", re.compile(r"\bgh[pousr]_[A-Za-z0-9_]{36,255}\b")),
              ("Google API key", re.compile(r"\bAIza[0-9A-Za-z\-_]{35}\b")),
              ("OpenAI key", re.compile(r"\bsk-[A-Za-z0-9]{32,}\b")),
              ("Slack token", re.compile(r"\bxox[baprs]-[A-Za-z0-9-]{20,}\b")),
              ("Discord webhook", re.compile(r"https://discord(?:app)?\.com/api/webhooks/[0-9]+/[A-Za-z0-9_\-]+")),
              ("Private key block", re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH |DSA )?PRIVATE KEY-----")),
              ("AWS access key", re.compile(r"\bAKIA[0-9A-Z]{16}\b")),
              ("Firebase server key", re.compile(r"\bAAAA[A-Za-z0-9_-]{7}:[A-Za-z0-9_-]{100,}\b")),
              ("Hardcoded password", re.compile(r"(?i)\b(password|passwd|pwd|secret|token|api[_-]?key|client[_-]?secret|keystore[_-]?password|store[_-]?password|key[_-]?password)\b\s*[:=]\s*[\"'][^\"']{12,}[\"']")),
              ("Gradle secret property", re.compile(r"(?i)\b(YOUTUBE_INNERTUBE_API_KEY|RELEASE_STORE_PASSWORD|RELEASE_KEY_PASSWORD|SIGNING_KEY_ALIAS|SIGNING_KEY_PASSWORD)\b\s*=\s*[^\s#]{12,}"))
          ]

          def is_excluded(path: Path) -> bool:
              rel = path.relative_to(root).as_posix()
              if path.name in excluded_files:
                  return True
              if path.suffix.lower() in binary_extensions:
                  return True
              for excluded in excluded_dirs:
                  if rel == excluded or rel.startswith(excluded + "/"):
                      return True
              return False

          def is_allowed(line: str) -> bool:
              lowered = line.lower()
              return any(word in lowered for word in allowed_words)

          findings = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              if is_excluded(path):
                  continue
              if path.stat().st_size > 2_000_000:
                  continue

              try:
                  lines = path.read_text(encoding="utf-8").splitlines()
              except UnicodeDecodeError:
                  continue

              rel = path.relative_to(root).as_posix()

              for number, line in enumerate(lines, start=1):
                  if is_allowed(line):
                      continue
                  for label, pattern in patterns:
                      if pattern.search(line):
                          findings.append(f"{rel}:{number}: {label}")

          if findings:
              print("Potential secrets found:")
              for item in findings:
                  print(item)
              sys.exit(1)

          print("No hardcoded secrets found.")
          PY
