name: Apply Player Cover Size Fix

on:
  push:
    branches:
      - claude/simpmusic-graphic-improvements-le6347
    paths:
      - .github/player-cover-size-fix.patch
      - .github/workflows/apply-player-cover-size-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
      - name: Restore large player artwork
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('app/src/main/java/com/luc4n3x/levyra/ui/LevyraApp.kt')
          content = path.read_text(encoding='utf-8')
          old = '''            densePlayer -> 214.dp
            compactPlayer -> 250.dp'''
          new = '''            densePlayer -> 292.dp
            compactPlayer -> 344.dp'''
          if content.count(old) != 1:
              raise SystemExit('Player artwork limits not found exactly once')
          path.write_text(content.replace(old, new, 1), encoding='utf-8')
          PY
          rm .github/player-cover-size-fix.patch
          rm .github/workflows/apply-player-cover-size-fix.yml
          git add -A
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(player): restore large artwork on phones"
          git push origin "HEAD:${{ github.ref_name }}"
