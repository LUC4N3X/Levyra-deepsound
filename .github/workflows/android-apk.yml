name: Build LEVYRA APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      YOUTUBE_INNERTUBE_API_KEY: ${{ secrets.YOUTUBE_INNERTUBE_API_KEY }}
      LEVYRA_KEYSTORE_PASSWORD: ${{ secrets.LEVYRA_KEYSTORE_PASSWORD }}
      LEVYRA_KEY_ALIAS: ${{ secrets.LEVYRA_KEY_ALIAS }}
      LEVYRA_KEY_PASSWORD: ${{ secrets.LEVYRA_KEY_PASSWORD }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platform-tools" "platforms;android-36" "build-tools;35.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.13'

      - name: Prepare Release Signing
        shell: bash
        env:
          LEVYRA_KEYSTORE_BASE64: ${{ secrets.LEVYRA_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "${YOUTUBE_INNERTUBE_API_KEY}"
          test -n "${LEVYRA_KEYSTORE_BASE64}"
          test -n "${LEVYRA_KEYSTORE_PASSWORD}"
          test -n "${LEVYRA_KEY_ALIAS}"
          test -n "${LEVYRA_KEY_PASSWORD}"
          printf "%s" "${LEVYRA_KEYSTORE_BASE64}" | base64 -d > app/levyra-release.jks

      - name: Build Release APK
        run: gradle --no-daemon clean assembleRelease

      - name: Collect APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk artifacts/LEVYRA-release.apk
          ls -la artifacts

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: levyra-release-apk
          path: artifacts/LEVYRA-release.apk
          if-no-files-found: error
