<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="420" viewBox="0 0 1500 420" role="img" aria-labelledby="title desc">
  <title id="title">Download Levyra from GitHub</title>
  <desc id="desc">Levyra GitHub download button with transparent outer background</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0.9">
      <stop offset="0%" stop-color="#101521"/>
      <stop offset="55%" stop-color="#08111f"/>
      <stop offset="100%" stop-color="#050b14"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b48bff"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b4df1"/>
    </linearGradient>
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#b9a7ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7c5cff" flood-opacity="0.28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="18" y="44" width="1464" height="332" rx="72" fill="url(#bg)" stroke="#2f3950" stroke-width="4"/>
    <rect x="20" y="46" width="1460" height="328" rx="70" fill="none" stroke="#95a3c7" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <rect x="54" y="98" width="245" height="224" rx="54" fill="url(#iconGrad)" filter="url(#glow)"/>
  <rect x="55" y="99" width="243" height="222" rx="53" fill="none" stroke="#f1eaff" stroke-opacity="0.28" stroke-width="2"/>

  <circle cx="176" cy="210" r="86" fill="#ffffff"/>
  <g transform="translate(176 210)">
    <path d="M-40,-5c0,-27 22,-49 49,-49c11,0 21,4 30,10c5,-9 8,-19 8,-30c10,6 16,15 18,27c9,1 17,5 23,11c6,6 10,15 10,25c0,20 -14,37 -32,42v52c0,4 -3,7 -7,7h-10c-4,0 -7,-3 -7,-7v-44c-5,2 -10,3 -16,3h-6v41c0,4 -3,7 -7,7h-9c-4,0 -7,-3 -7,-7v-25c-7,-1 -15,-4 -22,-8c-8,-5 -14,-12 -18,-21c-4,-3 -12,-8 -24,-8c-5,0 -8,-2 -8,-6c0,-5 4,-8 12,-8c10,0 19,2 28,6c3,-5 7,-9 12,-13c-10,-8 -17,-21 -17,-35z" fill="url(#iconGrad)"/>
    <path d="M-62,44c13,14 26,19 44,20" fill="none" stroke="url(#iconGrad)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <text x="372" y="155" fill="#c7d4f5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="8">GET THE LATEST RELEASE</text>
  <text x="370" y="255" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="112" font-weight="800" letter-spacing="-4">GitHub</text>
  <text x="372" y="318" fill="#9eaccb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="650">Official Levyra APK</text>

  <g filter="url(#glow)">
    <rect x="1225" y="140" width="180" height="136" rx="38" fill="#202735" fill-opacity="0.92" stroke="#47526c" stroke-width="3"/>
    <text x="1315" y="224" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="56" font-weight="800">APK</text>
  </g>

  <rect x="334" y="76" width="720" height="4" rx="2" fill="url(#lineGlow)"/>
</svg>
