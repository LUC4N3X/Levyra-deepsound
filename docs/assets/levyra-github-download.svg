<svg xmlns="http://www.w3.org/2000/svg" width="760" height="190" viewBox="0 0 760 190" role="img" aria-labelledby="title desc">
  <title id="title">Download Levyra from GitHub</title>
  <desc id="desc">Professional GitHub release download button for Levyra</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151922"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090c12"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.42"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="8" y="8" width="744" height="166" rx="28" fill="url(#panel)" stroke="#303846" stroke-width="2"/>
    <rect x="9" y="9" width="742" height="164" rx="27" fill="none" stroke="#ffffff" stroke-opacity="0.05"/>
  </g>

  <rect x="34" y="34" width="122" height="122" rx="30" fill="url(#accent)" filter="url(#glow)"/>
  <rect x="35" y="35" width="120" height="120" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>

  <circle cx="95" cy="95" r="39" fill="#ffffff"/>
  <g transform="translate(59 59) scale(3)">
    <path fill="#6d3ee8" d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.757-1.333-1.757-1.089-.745.084-.729.084-.729 1.205.084 1.84 1.237 1.84 1.237 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.605-2.665-.305-5.466-1.334-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23a11.5 11.5 0 0 1 3-.405c1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
  </g>

  <text x="190" y="61" fill="#c7d2fe" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="2.4">GET THE LATEST RELEASE</text>
  <text x="188" y="112" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="50" font-weight="800" letter-spacing="-1.5">GitHub</text>
  <text x="190" y="143" fill="#9aa7c0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Official Levyra APK</text>

  <g transform="translate(638 69)">
    <rect width="84" height="48" rx="17" fill="#20242d" stroke="#3a4150" stroke-width="1.5"/>
    <text x="42" y="31" text-anchor="middle" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">APK</text>
  </g>

  <rect x="178" y="22" width="548" height="3" rx="1.5" fill="url(#topLine)"/>
</svg>
